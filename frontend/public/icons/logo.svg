<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="flame" x1="256" y1="130" x2="256" y2="315" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6C878"/>
      <stop offset="0.45" stop-color="#E8A33D"/>
      <stop offset="1" stop-color="#BE6A2E"/>
    </linearGradient>
    <linearGradient id="thread" x1="150" y1="360" x2="362" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C99A4E"/>
      <stop offset="0.5" stop-color="#E8C077"/>
      <stop offset="1" stop-color="#C99A4E"/>
    </linearGradient>
    <linearGradient id="ring" x1="256" y1="24" x2="256" y2="488" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C99A4E"/>
      <stop offset="1" stop-color="#8C6B33"/>
    </linearGradient>
  </defs>

  <!-- seal ring -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="url(#ring)" stroke-width="5"/>
  <circle cx="256" cy="256" r="216" fill="none" stroke="#C99A4E" stroke-width="1.25" opacity="0.5"/>

  <!-- open book, single ribbon of pages -->
  <path d="M 138 344
           C 138 316 182 300 256 300
           C 330 300 374 316 374 344
           L 374 358
           C 374 332 330 318 256 318
           C 182 318 138 332 138 358
           Z"
        fill="#4B2142" stroke="#C99A4E" stroke-width="1.5" stroke-opacity="0.8"/>
  <line x1="256" y1="303" x2="256" y2="315" stroke="#C99A4E" stroke-width="2" opacity="0.8"/>

  <!-- flame rising from the book, one continuous thread -->
  <path d="M 238 312
           C 197 270 206 202 243 163
           C 249 155 254 145 256 136
           C 258 145 263 155 269 163
           C 306 202 315 270 274 312
           C 268 300 262 292 256 292
           C 250 292 244 300 238 312
           Z"
        fill="url(#flame)"/>

  <!-- the sutra thread, tying the mark together -->
  <path d="M 150 366
           C 184 400 222 336 256 366
           C 290 396 328 400 362 366"
        fill="none" stroke="url(#thread)" stroke-width="4.5" stroke-linecap="round"/>
  <circle cx="256" cy="366" r="5.5" fill="#E8C077"/>
</svg>
