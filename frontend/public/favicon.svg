<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="flameFav" x1="256" y1="100" x2="256" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="50%" stop-color="#F59B2B"/>
      <stop offset="100%" stop-color="#C2561C"/>
    </linearGradient>
  </defs>

  <!-- Solid rich background — makes icon pop on any browser tab color -->
  <circle cx="256" cy="256" r="256" fill="#1C0A00"/>

  <!-- Thin golden ring border -->
  <circle cx="256" cy="256" r="234" fill="none" stroke="#C99A4E" stroke-width="10"/>

  <!-- Bold, clear flame — simple teardrop, easy to read at 16px -->
  <path d="M 256 90
           C 256 90 150 210 150 310
           C 150 375 196 420 256 420
           C 316 420 362 375 362 310
           C 362 210 256 90 256 90 Z"
        fill="url(#flameFav)"/>

  <!-- Bright inner glow core of the flame -->
  <ellipse cx="256" cy="270" rx="48" ry="90" fill="#FFF0B0" opacity="0.55"/>
</svg>
